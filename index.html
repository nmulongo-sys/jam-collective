<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jam collective · Formation Musicale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Work+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Monoton&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#efe7d8; --panel:#f7f1e6; --panel2:#f0e7d6;
    --ink:#2a221b; --sub:#6b5d4c; --line:rgba(107,74,46,.16);
    --acc:#b3763b; --acc2:#6b4a2e; --accInk:#f7f1e6;
    --staff:rgba(107,74,46,.06); --chipA:#e3d3ba; --chipB:#d8c5a8;
    --rayon:14px;
    --serif:'Cormorant Garamond',Georgia,serif;
    --ui:'Work Sans',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --display:'Cormorant Garamond',Georgia,serif;
    font-size:16px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--ui);line-height:1.5;
    transition:background-color .5s ease,color .5s ease}

  /* Eyebrow mono, titres serif */
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--acc)}
  h1,h2,h3{font-family:var(--serif);color:var(--ink);font-weight:600;margin:0}

  /* En-tête à portées */
  .hero{position:relative;border-bottom:1px solid var(--line);
    background:repeating-linear-gradient(0deg,transparent 0 15px,var(--staff) 15px 16px),var(--panel);
    padding:30px 18px 24px;transition:background-color .5s ease,border-color .5s ease}
  .hero .wrap{max-width:820px;margin:0 auto;display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap}
  .hero .titrage{flex:1;min-width:220px}
  .hero h1{font-size:clamp(2rem,6vw,3rem);line-height:1.02;letter-spacing:-.01em;margin:8px 0 4px}
  .hero h1 a{color:var(--ink);text-decoration:none}
  .hero .sous{color:var(--sub);font-size:.95rem;margin:0}
  #themeToggle{font-family:var(--ui);font-weight:500;font-size:13px;color:var(--ink);
    background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:9px 16px;cursor:pointer;
    transition:background-color .3s,border-color .3s}
  #themeToggle:hover{border-color:var(--acc)}

  /* Bandeau suggestions (ligne de portée) */
  .bandeau{position:relative;overflow:hidden;border-bottom:1px solid var(--line);
    background:var(--panel2);white-space:nowrap}
  .bandeau .piste{display:inline-block;padding:8px 0;will-change:transform}
  .bandeau .item{display:inline-flex;align-items:center;gap:8px;margin:0 26px;font-size:.92rem}
  .bandeau .item .t{font-family:var(--serif);font-size:1.05rem;color:var(--ink);font-weight:600}
  .bandeau .item .a{color:var(--sub);font-family:var(--mono);font-size:.75rem;letter-spacing:.05em}
  .bandeau .item::before{content:"\266A";color:var(--acc)}
  .bandeau .vide{padding:9px 16px;color:var(--sub);font-size:.88rem}
  @media (prefers-reduced-motion: no-preference){
    .bandeau .piste.anime{animation:defile var(--duree,30s) linear infinite}
    .bandeau:hover .piste.anime{animation-play-state:paused}
    @keyframes defile{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  }

  nav.hub{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center;
    padding:10px 12px;position:sticky;top:0;z-index:5;
    background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
  nav.hub a{color:var(--sub);text-decoration:none;font-size:.88rem;font-weight:500;
    padding:7px 15px;border:1px solid var(--line);border-radius:999px;transition:color .2s,border-color .2s}
  nav.hub a:hover,nav.hub a:focus-visible{color:var(--acc);border-color:var(--acc)}
  nav.hub a.actif{color:var(--accInk);background:var(--acc);border-color:var(--acc)}
  nav.hub .id{margin-left:auto;font-size:.88rem;color:var(--sub);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  nav.hub .id .moi{color:var(--acc2);font-weight:600}

  main{max-width:820px;margin:0 auto;padding:20px 16px 60px}
  section{margin-top:34px}
  h2{font-size:1.7rem;margin:0 0 2px}
  h3{font-size:1.05rem;margin:0 0 6px}
  .legende{color:var(--sub);font-size:.92rem;margin:4px 0 16px}
  .cle{font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.14em;color:var(--acc)}
  .carte{background:var(--panel);border:1px solid var(--line);border-radius:var(--rayon);padding:15px 17px;margin-bottom:10px;
    transition:background-color .5s,border-color .5s}

  /* Vignettes projets — jaquettes de DVD */
  .grille{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:18px}
  .tuile{position:relative;display:flex;flex-direction:column;text-decoration:none;color:inherit;
    aspect-ratio:27/40;border-radius:8px;overflow:hidden;border:1px solid var(--line);background:var(--panel);
    box-shadow:0 4px 14px rgba(107,74,46,.16);transition:transform .2s ease,box-shadow .2s ease}
  .tuile:hover{transform:translateY(-5px) rotate(-.6deg);box-shadow:0 16px 32px rgba(107,74,46,.28)}
  .tuile .spine{position:absolute;left:0;top:0;bottom:0;width:11px;z-index:2;
    background:linear-gradient(var(--acc),var(--acc2));border-right:1px solid rgba(0,0,0,.2);
    box-shadow:inset -2px 0 4px rgba(0,0,0,.18)}
  .tuile .art{position:relative;flex:1;margin-left:11px;display:flex;align-items:flex-end;padding:14px;overflow:hidden;
    background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(255,255,255,.06) 13px 14px),linear-gradient(160deg,var(--acc2),var(--acc))}
  .tuile .art::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.24),transparent 44%)}
  .tuile .art .embleme{position:absolute;top:6px;right:12px;font-family:var(--serif);font-size:2.6rem;color:rgba(255,255,255,.26);line-height:1}
  .tuile .art .tt{position:relative;font-family:var(--serif);font-weight:600;font-size:1.55rem;line-height:1.02;
    color:#fff7ec;text-shadow:0 1px 6px rgba(0,0,0,.4)}
  .tuile .pied{margin-left:11px;background:var(--panel);padding:10px 13px;border-top:1px solid var(--line)}
  .tuile .au{color:var(--acc);font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tuile .me{color:var(--sub);font-size:.78rem;margin-top:4px}
  /* Jaquette qui reprend l'univers du projet */
  .tuile[data-univers="outrun"] .art{background:
    repeating-linear-gradient(0deg,transparent 0 13px,rgba(55,224,224,.06) 13px 14px),
    linear-gradient(165deg,#0d0a1f 0%,#241040 55%,#3d1140 100%)}
  .tuile[data-univers="outrun"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;
    background:linear-gradient(90deg,transparent,#37e0e0,transparent)}
  .tuile[data-univers="outrun"] .spine{background:linear-gradient(#ff3d8a,#37e0e0)}
  .tuile[data-univers="outrun"] .art .embleme{color:rgba(55,224,224,.4)}
  .tuile[data-univers="outrun"] .art .tt{color:#fff7ec;text-shadow:0 0 12px rgba(255,61,138,.7),0 0 26px rgba(55,224,224,.4)}

  /* ---- Univers FM (jaquettes) ---- */
  .tuile[data-univers="nuit-pastel"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(242,163,196,.06) 13px 14px),linear-gradient(165deg,#241a45,#4a3a78)}
  .tuile[data-univers="nuit-pastel"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#f2a3c4,transparent)}
  .tuile[data-univers="nuit-pastel"] .spine{background:linear-gradient(#f2a3c4,#b48ee6)}
  .tuile[data-univers="nuit-pastel"] .art .embleme{color:rgba(242,163,196,.35)}

  .tuile[data-univers="disco-solaire"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(255,211,77,.06) 13px 14px),linear-gradient(160deg,#3a0f2c,#a5306a,#e08a3c)}
  .tuile[data-univers="disco-solaire"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#ffd34d,transparent)}
  .tuile[data-univers="disco-solaire"] .spine{background:linear-gradient(#ffd34d,#e85e93)}
  .tuile[data-univers="disco-solaire"] .art .embleme{color:rgba(255,211,77,.4)}

  .tuile[data-univers="retrowave-pastel"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(127,214,207,.06) 13px 14px),linear-gradient(165deg,#1a1030,#3a1a44,#123a44)}
  .tuile[data-univers="retrowave-pastel"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#7fd6cf,transparent)}
  .tuile[data-univers="retrowave-pastel"] .spine{background:linear-gradient(#ff9db0,#7fd6cf)}
  .tuile[data-univers="retrowave-pastel"] .art .embleme{color:rgba(127,214,207,.4)}
  .tuile[data-univers="retrowave-pastel"] .art .tt{color:#fff0f4;text-shadow:0 0 12px rgba(255,157,176,.6),0 0 22px rgba(127,214,207,.35)}

  .tuile[data-univers="graphique-colorblock"] .art{background:linear-gradient(115deg,transparent 0 55%,#e4b100 55% 63%,#c23a2a 63% 71%,#12a5b8 71% 79%,transparent 79%),linear-gradient(165deg,#161616,#282828)}
  .tuile[data-univers="graphique-colorblock"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#e4b100,transparent)}
  .tuile[data-univers="graphique-colorblock"] .spine{background:linear-gradient(#e4b100,#c23a2a)}
  .tuile[data-univers="graphique-colorblock"] .art .embleme{color:rgba(228,177,0,.4)}

  .tuile[data-univers="jaune-soleil"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(255,255,255,.05) 13px 14px),linear-gradient(160deg,#c07f08,#f2b705,#ffd84d)}
  .tuile[data-univers="jaune-soleil"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#7a4d00,transparent)}
  .tuile[data-univers="jaune-soleil"] .spine{background:linear-gradient(#ffd84d,#e59500)}
  .tuile[data-univers="jaune-soleil"] .art .embleme{color:rgba(122,77,0,.3)}
  .tuile[data-univers="jaune-soleil"] .art .tt{color:#3a2600;text-shadow:0 1px 2px rgba(255,255,255,.4)}

  .tuile[data-univers="guinguette"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(217,164,65,.06) 13px 14px),linear-gradient(160deg,#2a160f,#5a251c,#7a3b1e)}
  .tuile[data-univers="guinguette"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#d9a441,transparent)}
  .tuile[data-univers="guinguette"] .spine{background:linear-gradient(#d9a441,#8f2f28)}
  .tuile[data-univers="guinguette"] .art .embleme{color:rgba(217,164,65,.35)}

  .tuile[data-univers="rnb-pourpre"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(240,200,90,.05) 13px 14px),linear-gradient(160deg,#25082e,#4a1250,#6a1f5e)}
  .tuile[data-univers="rnb-pourpre"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#f0c85a,transparent)}
  .tuile[data-univers="rnb-pourpre"] .spine{background:linear-gradient(#f0c85a,#a23c8e)}
  .tuile[data-univers="rnb-pourpre"] .art .embleme{color:rgba(240,200,90,.35)}

  .tuile[data-univers="plage-tropicale"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(230,201,154,.05) 13px 14px),linear-gradient(200deg,#e6c99a 0 12%,#12968f 40%,#0a5a58)}
  .tuile[data-univers="plage-tropicale"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#ffe0a3,transparent)}
  .tuile[data-univers="plage-tropicale"] .spine{background:linear-gradient(#37c9bf,#e6c99a)}
  .tuile[data-univers="plage-tropicale"] .art .embleme{color:rgba(230,201,154,.4)}

  .tuile[data-univers="baroque-revolution"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(224,178,74,.06) 13px 14px),linear-gradient(160deg,#2e0a0f,#6e131d,#9c2f1c)}
  .tuile[data-univers="baroque-revolution"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#e0b24a,transparent)}
  .tuile[data-univers="baroque-revolution"] .spine{background:linear-gradient(#e0b24a,#8f1420)}
  .tuile[data-univers="baroque-revolution"] .art .embleme{color:rgba(224,178,74,.4)}

  .tuile[data-univers="altrock-patine"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(181,98,47,.06) 13px 14px),linear-gradient(160deg,#161c16,#2a352a,#1c241c)}
  .tuile[data-univers="altrock-patine"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#b5622f,transparent)}
  .tuile[data-univers="altrock-patine"] .spine{background:linear-gradient(#6e7a52,#b5622f)}
  .tuile[data-univers="altrock-patine"] .art .embleme{color:rgba(181,98,47,.4)}

  .tuile[data-univers="britpop"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(200,210,220,.05) 13px 14px),linear-gradient(160deg,#242830,#39424e,#2c333c)}
  .tuile[data-univers="britpop"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,#c0413a,transparent 45%,#3f6fb0)}
  .tuile[data-univers="britpop"] .spine{background:linear-gradient(#c0413a,#3f6fb0)}
  .tuile[data-univers="britpop"] .art .embleme{color:rgba(200,210,220,.3)}

  .tuile[data-univers="chanson-poetique"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(232,224,206,.05) 13px 14px),linear-gradient(165deg,#2a3546,#43566e,#33414f)}
  .tuile[data-univers="chanson-poetique"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#e8e0ce,transparent)}
  .tuile[data-univers="chanson-poetique"] .spine{background:linear-gradient(#e8e0ce,#7d93ad)}
  .tuile[data-univers="chanson-poetique"] .art .embleme{color:rgba(232,224,206,.35)}

  .tuile[data-univers="jardin-papier"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(217,178,94,.06) 13px 14px),linear-gradient(160deg,#17231b,#35533f,#243a2c)}
  .tuile[data-univers="jardin-papier"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#d9b25e,transparent)}
  .tuile[data-univers="jardin-papier"] .spine{background:linear-gradient(#e6dcc4,#7a9c74)}
  .tuile[data-univers="jardin-papier"] .art .embleme{color:rgba(217,178,94,.38)}

  .tuile[data-univers="nuage-vagabond"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(230,169,95,.05) 13px 14px),linear-gradient(180deg,#222a33,#3c4652 55%,#5b5147)}
  .tuile[data-univers="nuage-vagabond"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#e6a95f,transparent)}
  .tuile[data-univers="nuage-vagabond"] .spine{background:linear-gradient(#90a0b0,#e6a95f)}
  .tuile[data-univers="nuage-vagabond"] .art .embleme{color:rgba(230,169,95,.34)}

  .tuile[data-univers="vitrail"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(224,190,90,.06) 13px 14px),linear-gradient(160deg,#0d183a,#1c2c66,#122048)}
  .tuile[data-univers="vitrail"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#e0be5a,transparent)}
  .tuile[data-univers="vitrail"] .spine{background:linear-gradient(#e0be5a,#3a5bb0)}
  .tuile[data-univers="vitrail"] .art .embleme{color:rgba(224,190,90,.4)}

  .tuile[data-univers="soul-vinyle"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(224,164,74,.06) 13px 14px),linear-gradient(160deg,#241611,#3d251a,#2a1812)}
  .tuile[data-univers="soul-vinyle"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#e0a44a,transparent)}
  .tuile[data-univers="soul-vinyle"] .spine{background:linear-gradient(#e0a44a,#6e3a1e)}
  .tuile[data-univers="soul-vinyle"] .art .embleme{color:rgba(224,164,74,.4)}

  .tuile[data-univers="yeye-retro"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(245,224,196,.06) 13px 14px),linear-gradient(160deg,#7a1414,#c23a24,#e8622e)}
  .tuile[data-univers="yeye-retro"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#f5e0c4,transparent)}
  .tuile[data-univers="yeye-retro"] .spine{background:linear-gradient(#f5e0c4,#c23a24)}
  .tuile[data-univers="yeye-retro"] .art .embleme{color:rgba(245,224,196,.4)}

  .tuile[data-univers="jazz-nocturne"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(224,178,106,.05) 13px 14px),linear-gradient(165deg,#0d1322,#1a2438,#12203a)}
  .tuile[data-univers="jazz-nocturne"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#e0b26a,transparent)}
  .tuile[data-univers="jazz-nocturne"] .spine{background:linear-gradient(#e0b26a,#3a4d78)}
  .tuile[data-univers="jazz-nocturne"] .art .embleme{color:rgba(224,178,106,.35)}

  .tuile[data-univers="duo-projecteur"] .art{background:repeating-linear-gradient(0deg,transparent 0 13px,rgba(232,193,90,.04) 13px 14px),linear-gradient(180deg,#0e0c0a,#1c1712 60%,#2a2118)}
  .tuile[data-univers="duo-projecteur"] .art::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#e8c15a,transparent)}
  .tuile[data-univers="duo-projecteur"] .spine{background:linear-gradient(#e8c15a,#8a4a3e)}
  .tuile[data-univers="duo-projecteur"] .art .embleme{color:rgba(232,193,90,.35)}

  /* Barre de tri de l'accueil + en-têtes de groupe */
  .tri-accueil{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 16px;align-items:center}
  .tri-accueil .lib{font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);margin-right:2px}
  .tri-chip{background:var(--panel2);color:var(--sub);border:1px solid var(--line);border-radius:999px;padding:6px 14px;font:inherit;font-size:.84rem;font-weight:500;cursor:pointer;transition:color .2s,border-color .2s,background-color .2s}
  .tri-chip:hover{color:var(--acc);border-color:var(--acc);filter:none}
  .tri-chip.actif{background:var(--acc);color:var(--accInk);border-color:var(--acc)}
  .grp-accueil{font-family:var(--serif);font-weight:600;color:var(--acc2);font-size:1.2rem;margin:24px 0 10px;display:flex;align-items:center;gap:9px}
  .grp-accueil:first-of-type{margin-top:6px}
  .grp-accueil .cpt{font-family:var(--mono);font-size:.62rem;font-weight:500;color:var(--sub);border:1px solid var(--line);border-radius:999px;padding:1px 8px}

  /* Motifs iconographiques par univers */
  .tuile .art .motif{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);width:60%;max-height:56%;color:#fff7ec;opacity:.5;pointer-events:none;filter:drop-shadow(0 2px 5px rgba(0,0,0,.35))}
  .tuile[data-univers="jaune-soleil"] .art .motif{color:#3a2600;opacity:.4;filter:none}
  .tuile[data-univers="retrowave-pastel"] .art .motif,
  .tuile[data-univers="outrun"] .art .motif{opacity:.6;filter:drop-shadow(0 0 8px rgba(255,255,255,.35))}
  .scope-projet .projet-hero .motif-hero{position:absolute;right:16px;bottom:-10px;width:150px;height:150px;color:var(--acc);opacity:.15;pointer-events:none;z-index:1}

  /* Enregistrements audio */
  .rec-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#c0392b;margin-right:6px;vertical-align:baseline}
  @media (prefers-reduced-motion: no-preference){.rec-en-cours .rec-dot{animation:recPulse 1s ease-in-out infinite}@keyframes recPulse{0%,100%{opacity:1}50%{opacity:.25}}}
  .rec-chrono{font-family:var(--mono);font-size:.95rem;color:var(--acc2);min-width:52px;display:inline-block}
  .audio-item{background:var(--panel2);border-radius:9px;padding:8px 12px;margin-bottom:6px}
  .audio-item audio{width:100%;margin-top:6px;display:block}
  .audio-item .doc a{color:var(--acc2);font-weight:600;text-decoration:none;word-break:break-word}
  .audio-item .doc a:hover{text-decoration:underline}
  .audio-item .m{color:var(--sub);font-size:.8rem;margin-top:2px}
  .rec-apercu{margin-top:10px}

  /* Bandeau playlist YouTube */
  .playlist-ruban{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-top:6px}
  .playlist-ruban .pl-txt{flex:1;min-width:180px}
  .playlist-ruban .pl-txt b{display:block;color:var(--ink)}
  .playlist-ruban .pl-txt span{color:var(--sub);font-size:.85rem}
  .playlist-ruban a.pl-btn{display:inline-flex;align-items:center;gap:8px;background:#c0261b;color:#fff;text-decoration:none;font-weight:700;padding:9px 16px;border-radius:9px;white-space:nowrap}
  .playlist-ruban a.pl-btn:hover{filter:brightness(1.08)}
  .playlist-ruban a.pl-btn svg{width:20px;height:20px;flex:0 0 auto}

  /* Posts attachés à un rôle */
  .pup-post{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--panel2);border-radius:9px;padding:8px 12px;margin-top:8px}
  .pup-post .pp-corps{flex:1;min-width:150px}
  .pup-post .m{color:var(--sub);font-size:.8rem;margin-top:2px}
  .pup-post .pp-corps audio{width:100%;margin-top:6px;display:block}
  .pup-post .pp-vid{width:92px;border-radius:6px;cursor:pointer;flex:0 0 auto}
  .pup-post .lecteur{flex-basis:100%}
  .pup-post .doc a{color:var(--acc2);font-weight:600;text-decoration:none;word-break:break-word}
  .pup-post .doc a:hover{text-decoration:underline}

  /* Formulaires */
  input,select,textarea{background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:10px;padding:9px 12px;font:inherit;font-size:.95rem;max-width:100%}
  input::placeholder{color:var(--sub);opacity:.8}
  input:focus-visible,select:focus-visible,textarea:focus-visible,button:focus-visible,a:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
  button{background:var(--acc);color:var(--accInk);border:0;border-radius:10px;padding:9px 16px;font:inherit;font-weight:600;cursor:pointer;transition:filter .2s}
  button:hover{filter:brightness(1.06)}
  button.discret{background:transparent;color:var(--sub);border:1px solid var(--line);font-weight:500;padding:6px 12px;font-size:.85rem}
  button.discret:hover{color:var(--acc);border-color:var(--acc);filter:none}
  button.inviter{background:var(--panel2);color:var(--acc2);border:1px solid var(--acc)}
  button.danger{background:transparent;color:#a3492e;border:1px solid #a3492e;font-weight:500;padding:6px 12px;font-size:.85rem}
  .ligne{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
  .ligne input[type=url],.ligne input.pousse,.ligne input[type=text]{flex:1;min-width:150px}
  .ss-titre{font-family:var(--serif);font-size:1.15rem;font-weight:600}
  .carte.histoire p{margin:.5rem 0 0;line-height:1.62;color:var(--sub);font-size:.94rem}
  .carte.histoire p::first-letter{font-family:var(--serif);font-size:1.5em;line-height:1;color:var(--acc)}

  /* Dispos heatmap */
  .grille-dispo{width:100%;border-collapse:separate;border-spacing:4px}
  .grille-dispo th{font-family:var(--mono);font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;color:var(--sub);font-weight:500;padding:2px}
  .grille-dispo td.jour{font-weight:600;font-size:.85rem;color:var(--ink);text-align:right;padding-right:6px;white-space:nowrap}
  .cell{width:100%;min-height:44px;border-radius:9px;border:1px solid var(--line);cursor:pointer;
    background:var(--panel2);color:var(--sub);font-size:.8rem;font-weight:600;
    display:flex;align-items:center;justify-content:center;position:relative;padding:6px 2px;transition:border-color .2s}
  .cell:hover{border-color:var(--acc)}
  .cell.moi{box-shadow:inset 0 0 0 2px var(--acc)}
  .cell .cnt{font-size:.95rem;color:var(--ink)}
  .cell .chk{position:absolute;top:3px;right:5px;color:var(--acc2);font-size:.66rem;font-weight:700}
  .legende-heat{display:flex;gap:10px;align-items:center;font-size:.8rem;color:var(--sub);margin-top:10px;flex-wrap:wrap}
  .echelle{display:inline-flex;gap:3px}
  .echelle span{width:16px;height:12px;border-radius:3px;border:1px solid var(--line)}

  /* Pupitres */
  .pup-tete{display:flex;flex-wrap:wrap;gap:8px 12px;align-items:center}
  .pup-tete .nom{font-family:var(--serif);font-size:1.2rem;font-weight:600;flex:1;min-width:150px}
  .badge{font-family:var(--mono);font-size:.66rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;padding:3px 9px;border-radius:999px;border:1px solid;white-space:nowrap}
  .b-indispensable{color:var(--accInk);background:var(--acc);border-color:var(--acc)}
  .b-souhaitable{color:var(--acc2);border-color:var(--acc2)}
  .b-bonus{color:var(--sub);border-color:var(--line)}
  .pup-note{color:var(--sub);font-size:.85rem;margin-top:4px}
  .inscrits{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .inscrit{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--panel2);border-radius:9px;padding:6px 10px}
  .inscrit .p{font-weight:600}.inscrit .p.self{color:var(--acc2)}
  .inscrit .statut{color:var(--sub);font-size:.85rem}
  .vide{color:var(--sub);font-size:.85rem;font-style:italic;margin-top:8px}
  .pup-action{margin-top:10px}

  /* Participants + badge principal (kawaii, version caramel) */
  .parti-tete{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .pnom{font-family:var(--serif);font-weight:600;font-size:1.25rem}.pnom.self{color:var(--acc2)}
  .proles{color:var(--sub);font-size:.85rem;margin-top:6px}
  .sans{color:var(--sub);font-size:.8rem;font-style:italic}
  .kawaii{display:inline-flex;align-items:center;gap:5px;font-family:var(--ui);font-size:.74rem;font-weight:600;color:var(--accInk);
    padding:3px 11px 3px 9px;border-radius:999px;
    background:linear-gradient(135deg,var(--acc),#cf9a55);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35),0 2px 7px rgba(107,74,46,.22);border:1px solid rgba(255,255,255,.25)}
  .kawaii .etoile{font-size:.8em}
  @media (prefers-reduced-motion: no-preference){.kawaii{transition:transform .15s}.kawaii:hover{transform:translateY(-1px) rotate(-1.5deg)}}

  /* Répétitions */
  .rep-tete{display:flex;gap:8px 12px;align-items:baseline;flex-wrap:wrap}
  .rep-quand{font-family:var(--serif);font-weight:600;font-size:1.25rem;color:var(--acc2)}
  .rep-lieu{color:var(--acc);font-weight:600}
  .rep-note{color:var(--sub);font-size:.9rem;margin:6px 0}
  .compte{display:flex;gap:14px;margin:10px 0;font-size:.9rem}
  .compte .n{font-weight:700;font-family:var(--serif);font-size:1.1rem}.compte .oui{color:var(--acc2)}.compte .peut{color:var(--acc)}
  .noms{font-size:.85rem;color:var(--sub);margin-bottom:8px}.noms b{color:var(--ink);font-weight:600}
  .reponses{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .rb{background:var(--panel2);color:var(--sub);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:.85rem;font-weight:600;cursor:pointer}
  .rb:hover{filter:brightness(.97)}
  .rb.on-oui{background:var(--acc2);color:var(--accInk);border-color:var(--acc2)}
  .rb.on-peut{background:var(--acc);color:var(--accInk);border-color:var(--acc)}
  .rb.on-non{background:transparent;color:#a3492e;border-color:#a3492e}

  /* Partitions / groupes */
  .part-fichier{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--panel2);border-radius:9px;padding:8px 12px;margin-bottom:6px}
  .part-fichier .doc{flex:1;min-width:0}
  .part-fichier a{color:var(--acc2);font-weight:600;text-decoration:none;word-break:break-word}
  .part-fichier a:hover{text-decoration:underline}
  .part-fichier .m{color:var(--sub);font-size:.8rem}
  .ic-doc{width:20px;height:20px;flex-shrink:0;color:var(--acc)}
  .grp-titre{font-family:var(--serif);font-weight:600;color:var(--acc2);font-size:1.15rem;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
  .grp-titre:first-child{margin-top:0}
  .grp-titre .b{font-family:var(--mono);font-size:.64rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;padding:2px 8px;border-radius:999px;border:1px solid}

  /* Vidéos */
  .video{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
  .video img{width:120px;border-radius:8px;cursor:pointer;display:block;flex-shrink:0;border:1px solid var(--line)}
  .video .corps{flex:1;min-width:0}
  .video .titre{font-weight:600;word-break:break-word}
  .video .meta{color:var(--sub);font-size:.82rem;margin-top:2px}
  .video a{color:var(--acc2);word-break:break-all;font-size:.85rem}
  .lecteur{margin-top:10px;flex-basis:100%}
  .lecteur iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:10px}
  .cat{font-family:var(--mono);font-size:.64rem;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:999px;background:var(--panel2);color:var(--acc);margin-right:6px;border:1px solid var(--line)}

  /* Messages */
  #fil-messages{max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 2px;margin-bottom:12px}
  .msg{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 12px;max-width:88%}
  .msg.demoi{align-self:flex-end;border-color:var(--acc)}
  .msg .tete{font-size:.78rem;color:var(--sub);margin-bottom:2px}.msg .tete b{color:var(--acc2)}
  .msg .texte{white-space:pre-wrap;word-break:break-word}

  .retour{display:inline-flex;align-items:center;gap:6px;color:var(--sub);text-decoration:none;font-size:.88rem;margin-bottom:8px;font-family:var(--mono);letter-spacing:.04em}
  .retour:hover{color:var(--acc)}
  .infos{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
  .infos div{background:var(--panel2);border-radius:10px;padding:10px 12px}
  .infos .val{font-family:var(--serif);font-size:1.15rem;font-weight:600;margin-top:2px}
  .infos .val small{font-weight:400;color:var(--sub);font-family:var(--ui)}

  #bandeau-alerte{display:none;position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
    background:var(--acc2);border:1px solid var(--acc);color:var(--accInk);padding:10px 18px;border-radius:12px;font-size:.9rem;z-index:20;max-width:92%}
  footer{text-align:center;color:var(--sub);font-size:.8rem;padding:24px 14px;border-top:1px solid var(--line);margin-top:40px;font-family:var(--mono);letter-spacing:.04em}

  /* ===== Thème PAR PROJET (le hub reste FM) ===== */
  .scope-projet{background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:6px;
    transition:background-color .4s,color .4s,border-color .4s}
  .projet-hero{position:relative;overflow:hidden;padding:30px 20px 26px;border-bottom:1px solid var(--line)}
  .projet-hero .hero-in{position:relative;z-index:2}
  .projet-hero .sun,.projet-hero .horizon{display:none}
  .projet-hero .staff{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 15px,var(--staff) 15px 16px)}
  .pt-titre{font-family:var(--display);font-weight:600;font-size:clamp(1.9rem,7vw,3rem);line-height:1.02;margin:0;color:var(--ink)}
  .pt-sous{color:var(--sub);margin:8px 0 12px;font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase}
  .scope-projet > section{padding:0 18px;margin-top:26px}
  .scope-projet > section:first-of-type{margin-top:22px}
  .scope-projet > section:last-child{padding-bottom:22px}

  /* Univers OUTRUN (Nightcall & co.) */
  .scope-projet[data-univers="outrun"]{
    --bg:#0d0a1f; --panel:#171233; --panel2:#1e1840;
    --ink:#eae6ff; --sub:#9d95c9; --line:#2c2358;
    --acc:#ff3d8a; --acc2:#37e0e0; --accInk:#0d0a1f;
    --staff:rgba(55,224,224,.06); --chipA:#241a4d; --chipB:#1a1440;
    --display:'Monoton',cursive; --serif:'Work Sans',system-ui,sans-serif}
  .scope-projet[data-univers="outrun"] .projet-hero{text-align:center;
    background:linear-gradient(180deg,#0d0a1f 0%,#241040 55%,#3d1140 100%)}
  .scope-projet[data-univers="outrun"] .projet-hero .staff{display:none}
  .scope-projet[data-univers="outrun"] .sun{display:block;position:absolute;left:50%;bottom:-70px;transform:translateX(-50%);
    width:220px;height:220px;border-radius:50%;background:linear-gradient(180deg,#ffb45a 0%,#ff3d8a 70%);
    -webkit-mask:linear-gradient(180deg,#000 0 55%,transparent 55% 58%,#000 58% 66%,transparent 66% 69%,#000 69% 76%,transparent 76% 79%,#000 79% 100%);
            mask:linear-gradient(180deg,#000 0 55%,transparent 55% 58%,#000 58% 66%,transparent 66% 69%,#000 69% 76%,transparent 76% 79%,#000 79% 100%);opacity:.8}
  .scope-projet[data-univers="outrun"] .horizon{display:block;position:absolute;left:0;right:0;bottom:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--acc2),transparent)}
  .scope-projet[data-univers="outrun"] .pt-titre{color:#eae6ff;letter-spacing:.05em;
    text-shadow:0 0 18px rgba(255,61,138,.55),0 0 40px rgba(55,224,224,.25)}
  @media (prefers-reduced-motion: no-preference){
    .scope-projet[data-univers="outrun"] .sun{animation:lever 1.4s ease-out}
    @keyframes lever{from{transform:translateX(-50%) translateY(60px);opacity:0}to{transform:translateX(-50%);opacity:.8}}
  }

  /* ---- Palettes de page projet (une par univers FM) ---- */
  .scope-projet[data-univers="nuit-pastel"]{--bg:#1b1633;--panel:#241d45;--panel2:#2b2352;--ink:#efe9ff;--sub:#b3a9d6;--line:#3a3266;--acc:#f2a3c4;--acc2:#b48ee6;--accInk:#1b1633;--staff:rgba(242,163,196,.06)}
  .scope-projet[data-univers="nuit-pastel"] .projet-hero{background:linear-gradient(180deg,#1b1633,#3a2b5e)}
  .scope-projet[data-univers="disco-solaire"]{--bg:#2a0f22;--panel:#3a1730;--panel2:#45203a;--ink:#ffe9d6;--sub:#d3a3b8;--line:#5a2848;--acc:#f4b03c;--acc2:#e85e93;--accInk:#2a0f22;--staff:rgba(244,176,60,.06)}
  .scope-projet[data-univers="disco-solaire"] .projet-hero{background:linear-gradient(180deg,#2a0f22,#7a1f4f 60%,#c76a2e)}
  .scope-projet[data-univers="retrowave-pastel"]{--bg:#1e1533;--panel:#28203f;--panel2:#2f2748;--ink:#f2e9f5;--sub:#bdb0cf;--line:#3c3358;--acc:#ff9db0;--acc2:#7fd6cf;--accInk:#1e1533;--staff:rgba(127,214,207,.06)}
  .scope-projet[data-univers="retrowave-pastel"] .projet-hero{background:linear-gradient(180deg,#1e1533,#3a1a44 55%,#123a44)}
  .scope-projet[data-univers="graphique-colorblock"]{--bg:#141414;--panel:#1e1e1e;--panel2:#262626;--ink:#f4f0e6;--sub:#b0b0aa;--line:#333333;--acc:#e4b100;--acc2:#12a5b8;--accInk:#141414;--staff:rgba(228,177,0,.05)}
  .scope-projet[data-univers="graphique-colorblock"] .projet-hero{background:linear-gradient(160deg,#141414,#242424)}
  .scope-projet[data-univers="jaune-soleil"]{--bg:#2a2109;--panel:#38300f;--panel2:#423814;--ink:#fff6d8;--sub:#cabf8a;--line:#5a4e1a;--acc:#f2b705;--acc2:#e59500;--accInk:#2a2109;--staff:rgba(242,183,5,.06)}
  .scope-projet[data-univers="jaune-soleil"] .projet-hero{background:linear-gradient(180deg,#2a2109,#7a5f0a 60%,#c79a12)}
  .scope-projet[data-univers="guinguette"]{--bg:#241209;--panel:#331b0f;--panel2:#3d2214;--ink:#f5e6d3;--sub:#c3a889;--line:#4d3320;--acc:#d9a441;--acc2:#a23c30;--accInk:#241209;--staff:rgba(217,164,65,.06)}
  .scope-projet[data-univers="guinguette"] .projet-hero{background:linear-gradient(180deg,#241209,#5a251c 60%,#7a3b1e)}
  .scope-projet[data-univers="rnb-pourpre"]{--bg:#1e0a24;--panel:#2c1030;--panel2:#37143a;--ink:#f5e6ff;--sub:#c0a3cf;--line:#4a2050;--acc:#f0c85a;--acc2:#c04c9e;--accInk:#1e0a24;--staff:rgba(240,200,90,.06)}
  .scope-projet[data-univers="rnb-pourpre"] .projet-hero{background:linear-gradient(180deg,#1e0a24,#4a1250 60%,#6a1f5e)}
  .scope-projet[data-univers="plage-tropicale"]{--bg:#062e2c;--panel:#0c3a37;--panel2:#124541;--ink:#e9f6f2;--sub:#a3c8c0;--line:#1c5a54;--acc:#37c9bf;--acc2:#e6c99a;--accInk:#062e2c;--staff:rgba(55,201,191,.06)}
  .scope-projet[data-univers="plage-tropicale"] .projet-hero{background:linear-gradient(180deg,#062e2c,#0e7a72 60%,#12968f)}
  .scope-projet[data-univers="baroque-revolution"]{--bg:#25080c;--panel:#341016;--panel2:#40151b;--ink:#ffe9d6;--sub:#d3a8a3;--line:#5a2028;--acc:#e0b24a;--acc2:#c0392b;--accInk:#25080c;--staff:rgba(224,178,74,.06)}
  .scope-projet[data-univers="baroque-revolution"] .projet-hero{background:linear-gradient(180deg,#25080c,#6e131d 60%,#9c2f1c)}
  .scope-projet[data-univers="altrock-patine"]{--bg:#141a14;--panel:#1e261e;--panel2:#262f26;--ink:#eef0e6;--sub:#a8b0a2;--line:#333d33;--acc:#b5622f;--acc2:#8a9668;--accInk:#141a14;--staff:rgba(181,98,47,.05)}
  .scope-projet[data-univers="altrock-patine"] .projet-hero{background:linear-gradient(180deg,#141a14,#2a352a 60%,#1c241c)}
  .scope-projet[data-univers="britpop"]{--bg:#20242c;--panel:#2a2f38;--panel2:#323844;--ink:#eef1f5;--sub:#a9b2bd;--line:#3d4652;--acc:#c0413a;--acc2:#4a86e8;--accInk:#20242c;--staff:rgba(200,210,220,.05)}
  .scope-projet[data-univers="britpop"] .projet-hero{background:linear-gradient(180deg,#20242c,#39424e 60%,#2c333c)}
  .scope-projet[data-univers="chanson-poetique"]{--bg:#212a36;--panel:#2a3542;--panel2:#32404f;--ink:#eef2f6;--sub:#aab6c2;--line:#3d4d5e;--acc:#7d93ad;--acc2:#e8e0ce;--accInk:#212a36;--staff:rgba(232,224,206,.05)}
  .scope-projet[data-univers="chanson-poetique"] .projet-hero{background:linear-gradient(180deg,#212a36,#43566e 60%,#33414f)}
  .scope-projet[data-univers="jardin-papier"]{--bg:#17231b;--panel:#1f2f24;--panel2:#26382b;--ink:#eef3e9;--sub:#a9bda8;--line:#33472f;--acc:#d9b25e;--acc2:#8fb184;--accInk:#17231b;--staff:rgba(217,178,94,.05)}
  .scope-projet[data-univers="jardin-papier"] .projet-hero{background:linear-gradient(180deg,#17231b,#35533f 60%,#243a2c)}
  .scope-projet[data-univers="nuage-vagabond"]{--bg:#1d232b;--panel:#262e38;--panel2:#2e3742;--ink:#eef1f5;--sub:#a6b0bc;--line:#3a4551;--acc:#e6a95f;--acc2:#90a0b0;--accInk:#1d232b;--staff:rgba(230,169,95,.05)}
  .scope-projet[data-univers="nuage-vagabond"] .projet-hero{background:linear-gradient(180deg,#1d232b,#3c4652 55%,#5b5147)}

<script>
"use strict";
/* ================= CONFIG ================= */
const SB_URL = "https://hifqtzxhmboxbruraiab.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpZnF0enhobWJveGJydXJhaWFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMjgwMzcsImV4cCI6MjA5ODYwNDAzN30.5UDvijZCHWdMjy6VVfOzt3r_txxXpqSDn9u1khtgHqU";

const ENTETES = {"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"};

async function api(chemin, options={}){
  const {headers, ...rest} = options;
  const rep = await fetch(SB_URL+"/rest/v1/"+chemin, {...rest, headers:{...ENTETES,...(headers||{})}});
  if(!rep.ok){ throw new Error(rep.status+" "+await rep.text()); }
  const b = await rep.text(); return b ? JSON.parse(b) : null;
}
const lire=(t,q="")=>api(t+"?select=*"+q);
const inserer=(t,l)=>api(t,{method:"POST",body:JSON.stringify(l),headers:{"Prefer":"return=representation"}});

const upsert=(t,l,conflit)=>api(t+"?on_conflict="+conflit,{method:"POST",body:JSON.stringify(l),headers:{"Prefer":"resolution=merge-duplicates,return=representation"}});

function alerte(txt){const b=document.getElementById("bandeau-alerte");b.textContent=txt;b.style.display="block";clearTimeout(alerte._t);alerte._t=setTimeout(()=>b.style.display="none",5000);}
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function aide(txt,bas){ return `<span class="aide${bas?' bas':''}" tabindex="0" role="button" aria-label="Aide : ${esc(txt)}">?<span class="bulle" role="tooltip">${esc(txt)}</span></span>`; }
const enc=s=>encodeURIComponent(s);

/* ================= IDENTITÉ GLOBALE ================= */
const CLE_MOI="jam.moi", CLE_ADMIN="jam.admin";
let MOI = null;
try{ MOI = JSON.parse(localStorage.getItem(CLE_MOI)||"null"); }catch(e){ MOI=null; }
const estAdmin=()=>localStorage.getItem(CLE_ADMIN)==="1";

async function sIdentifier(prenom, nomFamille){
  prenom=(prenom||"").trim(); nomFamille=(nomFamille||"").trim();
  if(!prenom) return alerte("Indiquez votre prénom.");
  if(!nomFamille) return alerte("Indiquez au moins l'initiale de votre nom.");
  const initiale=nomFamille.charAt(0).toUpperCase();
  const affiche=prenom+" "+initiale+".";
  const existe=HUB.personnes.some(p=>p.prenom.toLowerCase()===affiche.toLowerCase());
  if(existe){
    if(!confirm("Un « "+affiche+" » est déjà inscrit.\n\n• Si c'est bien vous, cliquez OK.\n• Si c'est un homonyme, annulez et changez d'initiale (ou de prénom) pour éviter la confusion.")) return;
  }
  try{
    const [row]=await upsert("hub_personnes",{prenom:affiche},"prenom");
    MOI={id:row.id,prenom:row.prenom};
    localStorage.setItem(CLE_MOI,JSON.stringify(MOI));
    router();
  }catch(e){ alerte("Identification impossible : "+e.message); }
}
function seDeconnecter(){ MOI=null; localStorage.removeItem(CLE_MOI); router(); }

const nom=id=>{const p=HUB.personnes.find(x=>x.id===id);return p?p.prenom:"?";};

async function chargerHub(){
  const [pe,pr,su,di]=await Promise.all([
    lire("hub_personnes","&order=prenom.asc"),
    lire("hub_projets","&order=created_at.asc"),
    lire("hub_suggestions","&order=created_at.desc"),
    lire("hub_dispos")
  ]);
  HUB={personnes:pe,projets:pr,suggestions:su,dispos:di};
}

/* ================= ROUTEUR ================= */
function router(){
  const h=location.hash||"#/";
  if(h.startsWith("#/p/")) VUE={nom:"projet",slug:decodeURIComponent(h.slice(4))};
  else if(h==="#/dispos") VUE={nom:"dispos"};
  else if(h==="#/gestion") VUE={nom:"gestion"};
  else VUE={nom:"accueil"};
  window.scrollTo(0,0);
  rafraichir();
}
window.addEventListener("hashchange", router);

  const n=document.getElementById("nav-hub");
  const lien=(href,txt,actif)=>`<a href="${href}" class="${actif?"actif":""}">${txt}</a>`;
  let liens = lien("#/","Accueil",VUE.nom==="accueil") + lien("#/dispos","Mes dispos",VUE.nom==="dispos");
  if(estAdmin()) liens += lien("#/gestion","Gestion",VUE.nom==="gestion");

function rendreBandeau(){

  if(!s.length){ piste.className="piste"; piste.innerHTML='<span class="vide">Aucune suggestion pour l\'instant — proposez un morceau depuis l\'accueil.</span>'; return; }
  const un = s.map(x=>`<span class="item"><span class="t">${esc(x.titre)}</span><span class="a">${x.auteur?"— "+esc(x.auteur):""}</span></span>`).join("");

function motifSVG(u,cls){ const i=motifInner(u); return i?`<svg class="${cls}" viewBox="0 0 100 100" fill="none" aria-hidden="true">${i}</svg>`:""; }
function tuileAccueil(p){
  const n=AccueilMembres[p.id]||0;
  const meta=[p.tonalite,p.tempo?p.tempo+" BPM":null].filter(Boolean).join(" · ");
  const motif=motifSVG(p.univers,"motif")||'<span class="embleme" aria-hidden="true">♪</span>';
  return `<a class="tuile" data-univers="${esc(p.univers||'fm')}" href="#/p/${enc(p.slug)}">

    </a>`;
}
function grilleTuiles(list){ return `<div class="grille">`+list.map(tuileAccueil).join("")+`</div>`; }
function grilleGroupes(groupes){ return groupes.filter(g=>g.items.length).map(g=>`<p class="grp-accueil">${esc(g.titre)} <span class="cpt">${g.items.length}</span></p>`+grilleTuiles(g.items)).join(""); }
function parTitre(a,b){ return (a.titre||"").localeCompare(b.titre||"","fr",{sensitivity:"base"}); }
function grouper(actifs, clef, defaut){ const map=new Map(); actifs.forEach(p=>{ const k=clef(p)??defaut; if(!map.has(k))map.set(k,[]); map.get(k).push(p); }); return map; }
function corpsSelonMode(list){
  if(TRI_ACCUEIL==="decennie"){
    const map=grouper(list, p=>{ const d=decennieDe(p); return d==null?null:(d+"s"); }, "Sans date");
    const clefs=[...map.keys()].sort((a,b)=>{ if(a==="Sans date")return 1; if(b==="Sans date")return -1; return parseInt(b)-parseInt(a); });
    return grilleGroupes(clefs.map(k=>({titre:k,items:map.get(k).sort((a,b)=>(b.annee||0)-(a.annee||0)||parTitre(a,b))})));
  }
  if(TRI_ACCUEIL==="langue"){
    const ordre=["Français","Anglais"];
    const map=grouper(list, p=>p.langue||null, "Autre");
    const clefs=[...map.keys()].sort((a,b)=>{ const ia=ordre.indexOf(a),ib=ordre.indexOf(b); if(ia<0&&ib<0)return a.localeCompare(b,"fr"); if(ia<0)return 1; if(ib<0)return -1; return ia-ib; });
    return grilleGroupes(clefs.map(k=>({titre:k,items:map.get(k).sort(parTitre)})));
  }
  if(TRI_ACCUEIL==="style"){
    const map=grouper(list, p=>p.style||null, "Autre");
    const clefs=[...map.keys()].sort((a,b)=>{ if(a==="Autre")return 1; if(b==="Autre")return -1; return a.localeCompare(b,"fr"); });
    return grilleGroupes(clefs.map(k=>({titre:k,items:map.get(k).sort(parTitre)})));
  }
  return grilleTuiles(triFlat(list));
}
function corpsAccueil(actifs){
  const miens=MOI?actifs.filter(p=>MesProjets.has(p.id)):[];
  const autres=miens.length?actifs.filter(p=>!MesProjets.has(p.id)):actifs;

  if(miens.length) out+=`<p class="grp-accueil">Mes projets <span class="cpt">${miens.length}</span></p>`+grilleTuiles(triFlat(miens));
  let corps=autres.length?corpsSelonMode(autres):"";
  if(miens.length&&autres.length&&(TRI_ACCUEIL==="recent"||TRI_ACCUEIL==="alpha")) corps=`<p class="grp-accueil">Les autres projets <span class="cpt">${autres.length}</span></p>`+corps;
  return out+corps;
}

async function basculerDispo(k){
  if(!exigerId()) return;
  const cur=new Set(disposDe(MOI.id));
  cur.has(k)?cur.delete(k):cur.add(k);
  const arr=[...cur];
  const r=HUB.dispos.find(d=>d.personne_id===MOI.id);
  if(r) r.creneaux=arr; else HUB.dispos.push({personne_id:MOI.id,creneaux:arr});
  vueDispos(document.getElementById("app")); // retour visuel immédiat
  try{ await upsert("hub_dispos",{personne_id:MOI.id,creneaux:arr,maj:new Date().toISOString()},"personne_id"); }
  catch(e){ alerte("Dispo non enregistrée : "+e.message); }
}

  const univers=depuis?"fm":((document.getElementById("np-univers")||{}).value||"fm");
  const slug=slugUnique(slugifier(titre));
  try{
    const [p]=await inserer("hub_projets",{slug,titre,auteur:auteur||null,tonalite:tonalite||null,tempo,univers,propose_par:(depuis&&depuis.propose_par)||null});
    await semerPupitres(p.id);
    if(depuis&&depuis.id) await effacer("hub_suggestions","id=eq."+depuis.id);
    location.hash="#/p/"+enc(slug);
    alerte("Projet créé.");
  }catch(e){ alerte("Création impossible : "+e.message); }
}

function pid(){ return PROJET.meta.id; }
function inviterProjet(slug){
  const url=location.href.split("#")[0]+"#/p/"+enc(slug);
  const t="Rejoins le projet « "+PROJET.meta.titre+" » : "+url;
  if(navigator.share){ navigator.share({title:PROJET.meta.titre,text:"Rejoins le projet !",url}).catch(()=>{}); return; }
  navigator.clipboard.writeText(t).then(()=>alerte("Invitation copiée.")).catch(()=>prompt("Copiez ce lien :",url));
}
async function rejoindreProjet(){ if(!exigerId())return;

  if(!confirm("Quitter « "+PROJET.meta.titre+" » ?\nVos rôles dans ce projet seront libérés (partitions, vidéos et messages restent)."))return;
  try{

/* ---- pupitres ---- */
const LIB_STATUT={apprentissage:"en apprentissage",jouable:"jouable",maitrise:"maîtrisé"};
function remplirSelectPupitre(elId,avecGeneral){
  const sel=document.getElementById(elId); if(!sel) return; const avant=sel.value;
  let opts=avecGeneral?'<option value="">Général (tout le monde)</option>':"";
  if(PROJET.pupitres.length) opts+=PROJET.pupitres.map(p=>`<option value="${p.id}">${esc(p.instrument)}</option>`).join("");
  else if(!avecGeneral) opts='<option value="">Ajoutez d\'abord un rôle</option>';
  sel.innerHTML=opts; if(avant&&[...sel.options].some(o=>o.value===avant)) sel.value=avant;
}
function rendrePupitres(){
  const z=document.getElementById("liste-pupitres"); if(!z) return;
  if(!PROJET.pupitres.length){ z.innerHTML='<p class="legende">Aucun pupitre.</p>'; return; }
  z.innerHTML=PROJET.pupitres.map(p=>{
    const ins=PROJET.inscriptions.filter(i=>i.pupitre_id===p.id);
    const mien=MOI&&ins.find(i=>i.personne_id===MOI.id);
    const rangs=ins.map(i=>{
      const self=MOI&&i.personne_id===MOI.id;
      if(self) return `<div class="inscrit"><span class="p self">${esc(nom(i.personne_id))}</span>
        <select onchange="changerStatut('${i.id}',this.value)">${Object.entries(LIB_STATUT).map(([k,l])=>`<option value="${k}" ${i.statut===k?"selected":""}>${l}</option>`).join("")}</select>
        <button class="discret" onclick="desinscrire('${i.id}')">me retirer</button></div>`;
      return `<div class="inscrit"><span class="p">${esc(nom(i.personne_id))}</span><span class="statut">${LIB_STATUT[i.statut]||""}</span></div>`;
    }).join("");
    const corps=ins.length?`<div class="inscrits">${rangs}</div>`:`<p class="vide">Personne pour l'instant.</p>`;
    const action=mien?"":`<div class="pup-action"><button class="discret" onclick="inscrire('${p.id}')">Prendre ce rôle</button></div>`;
    const posts=postsDuRole(p.id);
    return `<div class="carte"><div class="pup-tete"><span class="nom">${esc(p.instrument)}</span><span class="badge b-${esc(p.besoin)}">${esc(p.besoin)}</span></div>
      ${p.note?`<div class="pup-note">${esc(p.note)}</div>`:""}${posts}${corps}${action}</div>`;
  }).join("");
}
async function inscrire(pupId){ if(!exigerId())return; try{ await upsert("proj_membres",{projet_id:pid(),personne_id:MOI.id},"projet_id,personne_id"); await inserer("proj_inscriptions",{projet_id:pid(),pupitre_id:pupId,personne_id:MOI.id,statut:"apprentissage"}); rafraichir(); }catch(e){ alerte("Inscription impossible : "+e.message); } }
async function desinscrire(id){ try{ await effacer("proj_inscriptions","id=eq."+id); rafraichir(); }catch(e){ alerte(e.message); } }
async function changerStatut(id,s){ try{ await modifier("proj_inscriptions","id=eq."+id,{statut:s}); rafraichir(); }catch(e){ alerte(e.message); } }
async function ajouterPupitre(){ if(!exigerId())return; const nom2=document.getElementById("np2-nom").value.trim(); if(!nom2)return alerte("Nom du rôle ?"); const besoin=document.getElementById("np2-besoin").value; try{ await inserer("proj_pupitres",{projet_id:pid(),instrument:nom2,besoin}); document.getElementById("np2-nom").value=""; rafraichir(); }catch(e){ alerte(e.message); } }

/* ---- participants + pupitre principal ---- */
function moiMembre(){ return PROJET.membres.find(m=>MOI&&m.personne_id===MOI.id); }
function rendrePrincipal(){
  const z=document.getElementById("zone-principal"); if(!z) return;
  if(!MOI||!moiMembre()){ z.innerHTML=""; return; }
  const m=moiMembre(); const cur=m&&m.pupitre_principal_id?m.pupitre_principal_id:"";
  const opts='<option value="">—</option>'+PROJET.pupitres.map(p=>`<option value="${p.id}" ${p.id===cur?"selected":""}>${esc(p.instrument)}</option>`).join("");
  z.innerHTML=`<span class="cle">Mon rôle principal :</span> <select onchange="definirPrincipal(this.value)">${opts}</select>`;

function badgeKawaii(instr){ return `<span class="kawaii"><span class="etoile" aria-hidden="true">✦</span>${esc(instr)}</span>`; }
function rendreParticipants(){
  rendrePrincipal();
  const z=document.getElementById("liste-participants"); if(!z) return;
  const list=[...PROJET.membres].sort((a,b)=>nom(a.personne_id).localeCompare(nom(b.personne_id),"fr"));
  if(!list.length){ z.innerHTML='<p class="legende">Personne n\'a encore rejoint ce projet.</p>'; return; }
  const nomPup=id=>(PROJET.pupitres.find(x=>x.id===id)||{}).instrument;

    const ids=[...new Set(PROJET.inscriptions.filter(i=>i.personne_id===m.personne_id).map(i=>i.pupitre_id))];

async function definirPrincipal(pupId){ if(!MOI)return; try{ await modifier("proj_membres","projet_id=eq."+pid()+"&personne_id=eq."+MOI.id,{pupitre_principal_id:pupId||null}); rafraichir(); }catch(e){ alerte(e.message); } }

/* ---- répétitions ---- */
function formatQuand(iso){ if(!iso)return "Date à définir"; const d=new Date(iso); if(isNaN(d))return "Date à définir";
  const j=d.toLocaleDateString("fr-BE",{weekday:"long",day:"numeric",month:"long"}); const h=d.toLocaleTimeString("fr-BE",{hour:"2-digit",minute:"2-digit"});
  return j.charAt(0).toUpperCase()+j.slice(1)+" · "+h; }
function rendreRepets(){
  const z=document.getElementById("liste-repets"); if(!z) return;
  if(!PROJET.repets.length){ z.innerHTML='<p class="legende">Aucune répétition proposée.</p>'; return; }
  const tri=[...PROJET.repets].sort((a,b)=>new Date(a.quand||8e15)-new Date(b.quand||8e15));
  z.innerHTML=tri.map(r=>{
    const pres=PROJET.presences.filter(x=>x.repet_id===r.id);
    const par=k=>pres.filter(x=>x.reponse===k);
    const oui=par("oui"),peut=par("peut");
    const mien=MOI&&pres.find(x=>x.personne_id===MOI.id);
    const ma=mien?mien.reponse:null;
    const noms=k=>par(k).map(x=>`<b>${esc(nom(x.personne_id))}</b>`).join(", ");
    const bloc=[]; if(oui.length)bloc.push("Vient : "+noms("oui")); if(peut.length)bloc.push("Peut-être : "+noms("peut"));
    const suppr=(MOI&&r.propose_par===MOI.id)?`<button class="discret" onclick="supprimerRepet('${r.id}')">retirer</button>`:"";
    return `<div class="carte"><div class="rep-tete"><span class="rep-quand">${formatQuand(r.quand)}</span>${r.lieu?`<span class="rep-lieu">${esc(r.lieu)}</span>`:""}</div>
      ${r.note?`<div class="rep-note">${esc(r.note)}</div>`:""}
      <div class="compte"><span><span class="n oui">${oui.length}</span> viennent</span><span><span class="n peut">${peut.length}</span> peut-être</span></div>
      ${bloc.length?`<div class="noms">${bloc.join(" — ")}</div>`:""}
      <div class="reponses"><span class="cle">Ma réponse :</span>
        <button class="rb ${ma==="oui"?"on-oui":""}" onclick="repondre('${r.id}','oui')">Je viens</button>
        <button class="rb ${ma==="peut"?"on-peut":""}" onclick="repondre('${r.id}','peut')">Peut-être</button>
        <button class="rb ${ma==="non"?"on-non":""}" onclick="repondre('${r.id}','non')">Absent</button>
        ${mien?`<button class="discret" onclick="retirerReponse('${mien.id}')">effacer</button>`:""}
        <span style="margin-left:auto">${suppr}</span></div></div>`;
  }).join("");
}
async function ajouterRepet(){ if(!exigerId())return; const quand=document.getElementById("nr-quand").value; const lieu=document.getElementById("nr-lieu").value.trim(); const note=document.getElementById("nr-note").value.trim();
  if(!quand&&!lieu&&!note)return alerte("Indiquez au moins une date ou un lieu.");
  try{ await inserer("proj_repets",{projet_id:pid(),quand:quand?new Date(quand).toISOString():null,lieu,note,propose_par:MOI.id}); document.getElementById("nr-quand").value="";document.getElementById("nr-lieu").value="";document.getElementById("nr-note").value=""; rafraichir(); }catch(e){ alerte(e.message); } }
async function repondre(rid,rep){ if(!exigerId())return; try{ await upsert("proj_presences",{projet_id:pid(),repet_id:rid,personne_id:MOI.id,reponse:rep},"repet_id,personne_id"); rafraichir(); }catch(e){ alerte(e.message); } }
async function retirerReponse(id){ try{ await effacer("proj_presences","id=eq."+id); rafraichir(); }catch(e){ alerte(e.message); } }
async function supprimerRepet(id){ try{ await effacer("proj_repets","id=eq."+id); rafraichir(); }catch(e){ alerte(e.message); } }

/* ---- partitions ---- */
const urlPublique=chemin=>SB_URL+"/storage/v1/object/public/"+BUCKET+"/"+chemin.split("/").map(enc).join("/");
function tailleLisible(o){ if(o==null)return ""; if(o<1024)return o+" o"; if(o<1048576)return (o/1024).toFixed(0)+" Ko"; return (o/1048576).toFixed(1)+" Mo"; }
function rendrePartitions(){
  remplirSelectPupitre("pt-pupitre",false);
  const z=document.getElementById("liste-partitions"); if(!z) return;
  const ic=`<svg class="ic-doc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>`;
  const nonClasse=(PROJET.partitions||[]).filter(p=>!p.pupitre_id);
  const total=(PROJET.partitions||[]).length;
  if(!nonClasse.length){
    z.innerHTML=total?'<p class="legende">Les partitions s\'affichent sur la carte de leur rôle, plus haut.</p>':'<p class="legende">Aucune partition déposée.</p>';
    return;
  }
  const rows=nonClasse.map(f=>{ const suppr=(MOI&&f.personne_id===MOI.id)?` <button class="discret" onclick="supprimerPartition('${f.id}')">retirer</button>`:"";
    return `<div class="part-fichier">${ic}<div class="doc"><a href="${urlPublique(f.chemin)}" target="_blank" rel="noopener" download>${esc(f.nom_fichier)}</a>
      <div class="m">déposé par ${esc(nom(f.personne_id))}${f.taille?" · "+tailleLisible(f.taille):""}${suppr}</div></div></div>`; }).join("");
  z.innerHTML=`<div class="carte part-groupe"><p class="grp-titre">Non classé</p>${rows}</div>`;
}

/* ---- enregistrements audio ---- */
let REC={mr:null,chunks:[],blob:null,mime:"",timer:null,t0:0};
function chronoTxt(ms){ const s=Math.floor(ms/1000); return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); }
function extAudio(mime){ if(!mime)return "webm"; if(mime.includes("mp4"))return "m4a"; if(mime.includes("ogg"))return "ogg"; if(mime.includes("mpeg"))return "mp3"; if(mime.includes("wav"))return "wav"; return "webm"; }
function micDispo(){ return !!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia&&window.MediaRecorder); }
async function basculerRec(){
  if(REC.mr&&REC.mr.state==="recording"){ REC.mr.stop(); return; }
  if(!exigerId()) return;
  if(!micDispo()) return alerte("Micro indisponible sur ce navigateur — dépose un fichier audio à la place.");
  try{
    const flux=await navigator.mediaDevices.getUserMedia({audio:true});
    const pref=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg"].find(t=>{try{return MediaRecorder.isTypeSupported(t);}catch(e){return false;}});
    REC.mr=pref?new MediaRecorder(flux,{mimeType:pref}):new MediaRecorder(flux);
    REC.chunks=[]; REC.blob=null; REC.mime=REC.mr.mimeType||pref||"audio/webm";
    REC.mr.ondataavailable=e=>{ if(e.data&&e.data.size) REC.chunks.push(e.data); };
    REC.mr.onstop=()=>{
      flux.getTracks().forEach(t=>t.stop());
      clearInterval(REC.timer);
      REC.blob=new Blob(REC.chunks,{type:REC.mime});
      const ctrl=document.getElementById("au-rec-ctrl"), btn=document.getElementById("au-rec-btn");
      if(ctrl) ctrl.classList.remove("rec-en-cours");
      if(btn) btn.innerHTML='<span class="rec-dot" aria-hidden="true"></span>Recommencer';
      const ap=document.getElementById("au-apercu"), pv=document.getElementById("au-preview");
      if(ap&&pv){ pv.src=URL.createObjectURL(REC.blob); ap.hidden=false; }
    };
    REC.mr.start();
    REC.t0=Date.now();
    const ch=document.getElementById("au-chrono");
    REC.timer=setInterval(()=>{ if(ch) ch.textContent=chronoTxt(Date.now()-REC.t0); },250);
    const ctrl=document.getElementById("au-rec-ctrl"), btn=document.getElementById("au-rec-btn"), ap=document.getElementById("au-apercu");
    if(ctrl) ctrl.classList.add("rec-en-cours");
    if(btn) btn.innerHTML='<span class="rec-dot" aria-hidden="true"></span>Arrêter';
    if(ap) ap.hidden=true;
  }catch(e){ alerte("Accès micro refusé ou impossible : "+e.message); }
}
function annulerRec(){ REC.blob=null; REC.chunks=[];
  const ap=document.getElementById("au-apercu"), btn=document.getElementById("au-rec-btn"), ch=document.getElementById("au-chrono");
  if(ap) ap.hidden=true; if(ch) ch.textContent="";
  if(btn) btn.innerHTML='<span class="rec-dot" aria-hidden="true"></span>Enregistrer au micro'; }
function titreAudioSaisi(defaut){ const c=document.getElementById("au-titre"); const t=(c&&c.value.trim())||""; return t||defaut; }
function pupitreAudioSaisi(){ const s=document.getElementById("au-pupitre"); return (s&&s.value)||null; }
async function televerserAudio(blobOuFichier, nomFichier, mime, titre){
  if(blobOuFichier.size>20*1024*1024) throw new Error("Fichier trop lourd (20 Mo max).");
  const pupId=pupitreAudioSaisi();
  const sur=nomFichier.replace(/[^\w.\-]+/g,"_").slice(0,80);
  const chemin=pid()+"/audio/"+(pupId||"general")+"/"+Date.now()+"-"+sur;
  const rep=await fetch(SB_URL+"/storage/v1/object/"+BUCKET+"/"+chemin.split("/").map(enc).join("/"),{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":mime||"application/octet-stream"},body:blobOuFichier});
  if(!rep.ok) throw new Error(rep.status+" "+await rep.text());
  await inserer("proj_audios",{projet_id:pid(),pupitre_id:pupId,personne_id:MOI.id,titre,type:"fichier",chemin,mime:mime||null,taille:blobOuFichier.size});
}
async function publierRec(){
  if(!exigerId()) return;
  if(!REC.blob) return alerte("Rien à publier — enregistre d'abord.");
  const d=new Date(); const defaut="Enregistrement du "+d.toLocaleDateString("fr-BE",{day:"numeric",month:"short"})+" "+d.toLocaleTimeString("fr-BE",{hour:"2-digit",minute:"2-digit"});
  const titre=titreAudioSaisi(defaut);
  try{ await televerserAudio(REC.blob, titre.replace(/\s+/g,"_")+"."+extAudio(REC.mime), REC.mime, titre); annulerRec(); const c=document.getElementById("au-titre"); if(c)c.value=""; rafraichir(); alerte("Enregistrement publié."); }
  catch(e){ alerte("Publication impossible : "+e.message); }
}
async function deposerAudio(){
  if(!exigerId()) return;
  const input=document.getElementById("au-fichier"), file=input&&input.files[0];
  if(!file) return alerte("Choisissez un fichier audio.");
  const btn=document.getElementById("au-dep-btn"); if(btn){btn.disabled=true;btn.textContent="Envoi…";}
  try{ await televerserAudio(file, file.name, file.type, titreAudioSaisi(file.name)); input.value=""; const c=document.getElementById("au-titre"); if(c)c.value=""; rafraichir(); alerte("Audio déposé."); }
  catch(e){ alerte("Envoi impossible : "+e.message); }
  finally{ if(btn){btn.disabled=false;btn.textContent="Déposer le fichier";} }
}

/* ---- grilles cajón (Atelier Cajón) ---- */
const ATELIER_CAJON_URL="https://nmulongo-sys.github.io/magic-drums/cajon.html";
const PLAYLIST_URL="https://www.youtube.com/playlist?list=PLOA1Oq_wM5Yo";
function b64urlUtf8(s){ return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function lienAtelier(contenu){ return ATELIER_CAJON_URL+"#g="+b64urlUtf8(JSON.stringify(contenu))+"&tab=parcours"; }
function validerGrille(txt){
  const d=JSON.parse(txt);
  if(!d||!Array.isArray(d.measures)||!d.measures.length||!d.measures.every(m=>Array.isArray(m))) throw new Error("le JSON ne contient pas de « measures » valide");
  return d;
}
async function ajouterGrille(){
  if(!exigerId()) return;
  const zone=document.getElementById("gr-json"); const txt=(zone&&zone.value.trim())||"";
  if(!txt) return alerte("Collez le JSON complet exporté depuis l'Atelier Cajón.");
  let contenu;
  try{ contenu=validerGrille(txt); }
  catch(e){ return alerte("Grille illisible : "+e.message+". Utilisez « JSON complet → Copier » dans l'Atelier."); }
  const t=document.getElementById("gr-titre");
  const titre=(t&&t.value.trim())||contenu.title||"Grille cajón";
  const sel=document.getElementById("gr-pupitre");
  try{
    await inserer("proj_grilles",{projet_id:pid(),pupitre_id:(sel&&sel.value)||null,personne_id:MOI.id,titre,contenu});
    zone.value=""; if(t)t.value=""; rafraichir(); alerte("Grille ajoutée.");
  }catch(e){ alerte("Impossible : "+e.message); }
}
function resumeGrille(c){
  const nbM=Array.isArray(c.measures)?c.measures.length:0;
  return [nbM+" mesure"+(nbM>1?"s":""), c.bpm?c.bpm+" BPM":null, (c.swing&&c.swing!==50)?"swing "+c.swing+"%":null].filter(Boolean).join(" · ");
}
function posteGrille(g){
  const c=g.contenu||{};
  const suppr=(MOI&&g.personne_id===MOI.id)?` <button class="discret" onclick="supprimerGrille('${g.id}')">retirer</button>`:"";
  return `<div class="pup-post"><div class="pp-corps"><span style="font-weight:600">${esc(g.titre||"Grille")}</span>
    <div class="m">Grille cajón · ${esc(resumeGrille(c))} · par ${esc(nom(g.personne_id))}${suppr}</div></div>
    <a href="${esc(lienAtelier(c))}" target="_blank" rel="noopener" style="text-decoration:none"><button>▶ S'entraîner</button></a></div>`;
}

let tutoI=0;
function ouvrirTuto(i){
  tutoI=i||0;
  let ov=document.getElementById("tuto-overlay");
  if(!ov){ ov=document.createElement("div"); ov.id="tuto-overlay";
    ov.innerHTML='<div class="tuto-carte" role="dialog" aria-modal="true" aria-label="Guide de démarrage"></div>';
    document.body.appendChild(ov);
    ov.addEventListener("click",e=>{ if(e.target===ov) fermerTuto(); });
    document.addEventListener("keydown",e=>{ if(e.key==="Escape") fermerTuto(); else if(document.getElementById("tuto-overlay").classList.contains("on")){ if(e.key==="ArrowRight")tutoNav(1); else if(e.key==="ArrowLeft")tutoNav(-1); } });

    <div class="emoji" aria-hidden="true">${s.e}</div>
    <div class="num">Étape ${tutoI+1} / ${TUTO.length}</div>
    <h3>${esc(s.t)}</h3>
    <p>${esc(s.c)}</p>
    <div class="tuto-dots" aria-hidden="true">${dots}</div>
    <div class="tuto-actions">
      <button class="tuto-passer" onclick="fermerTuto()">${dernier?'Fermer':'Passer'}</button>
      <div class="droite">
        ${tutoI>0?'<button class="discret" onclick="tutoNav(-1)">Précédent</button>':''}
        <button onclick="${dernier?'fermerTuto()':'tutoNav(1)'}">${dernier?'Commencer 🎶':'Suivant'}</button>

    </div>`;
}
function tutoNav(d){ tutoI=Math.max(0,Math.min(TUTO.length-1,tutoI+d)); rendreTuto(); }
function fermerTuto(){ const ov=document.getElementById("tuto-overlay"); if(ov) ov.classList.remove("on"); try{localStorage.setItem("jam-onboard-vu","1");}catch(e){} }

/* ================= DÉMARRAGE ================= */
router();
try{ if(!localStorage.getItem("jam-onboard-vu")) setTimeout(()=>ouvrirTuto(0),400); }catch(e){}
function saisieEnCours(){
  if(REC.mr&&REC.mr.state==="recording") return true;
  if(REC.blob) return true;
  const a=document.activeElement;
  if(a && /^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName) && a.type!=="button" && a.type!=="submit") return true;
  const champs=document.querySelectorAll('input[type=text],input[type=url],input[type=number],input[type=datetime-local],textarea');
  for(const el of champs){ if(el.value && el.value.trim()!=="") return true; }
  const fichiers=document.querySelectorAll('input[type=file]');
  for(const el of fichiers){ if(el.files && el.files.length) return true; }
  return false;
}
setInterval(()=>{ if(!document.hidden && !saisieEnCours()) rafraichir(); }, 8000);
document.addEventListener("visibilitychange",()=>{ if(!document.hidden && !saisieEnCours()) rafraichir(); });
</script>
